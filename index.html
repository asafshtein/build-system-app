// Advanced trigger pattern analysis
const getTriggerPatterns=function(log){
  if(!log||log.length<5)return null;
  var recent=log.slice(-60); // last 60 events
  // Time distribution
  var byTod={night:0,morning:0,afternoon:0,evening:0};
  // Context distribution
  var byCtx={};
  // Mood correlation (if mood logged same day)
  var wins=0,losses=0;
  var streakBreakers=[]; // contexts where relapses happened
  recent.forEach(function(e){
    if(byTod[e.tod]!==undefined)byTod[e.tod]++;
    if(e.ctx)byCtx[e.ctx]=(byCtx[e.ctx]||0)+1;
    if(e.won)wins++;else{losses++;if(e.ctx)streakBreakers.push(e.ctx);}
  });
  var topTod=Object.entries(byTod).sort(function(a,b){return b[1]-a[1];})[0];
  var topCtx=Object.entries(byCtx).sort(function(a,b){return b[1]-a[1];})[0];
  var topBreaker=streakBreakers.length?streakBreakers.sort(function(a,b){
    return streakBreakers.filter(function(v){return v===b;}).length-streakBreakers.filter(function(v){return v===a;}).length;
  })[0]:null;
  var winRate=recent.length>0?Math.round((wins/recent.length)*100):0;
  return{byTod:byTod,byCtx:byCtx,topTod:topTod,topCtx:topCtx,topBreaker:topBreaker,winRate:winRate,total:recent.length,wins:wins};
};

// Compute a benefit's current %, using the milestone curve
const getSciencePct=function(benefit,cDays){
  if(!cDays||cDays<=0)return 0;
  var ms=benefit.ms;
  if(cDays>=ms[ms.length-1].d)return ms[ms.length-1].p;
  for(var i=ms.length-2;i>=0;i--){
    if(cDays>=ms[i].d){
      var span=ms[i+1].d-ms[i].d;
      var prog=cDays-ms[i].d;
      return Math.round(ms[i].p+(ms[i+1].p-ms[i].p)*(prog/span));
    }
  }
  if(cDays<ms[0].d)return Math.round((cDays/ms[0].d)*ms[0].p);
  return 0;
};

// What milestone note to show for current day
const getBenefitNote=function(benefit,cDays){
  var ms=benefit.ms;
  var current=null;
  for(var i=0;i<ms.length;i++){if(cDays>=ms[i].d)current=ms[i];}
  var next=ms.find(function(m){return m.d>cDays;});
  return{current:current,next:next};
};

// Route: compute mission progress
const getRouteMissionProgress=function(mId,mType,st,cd,jrnl,pld){
  var won=cd.totalResisted||0;
  var beaten=st.beaten||[];
  var totalDays=st.totalDays||0;
  switch(mType){
    case"urge_won":return{val:won};
    case"streak":return{val:cleanDays(cd.start)};
    case"boss":return{val:beaten.length};
    case"total_days":return{val:totalDays};
    case"pledge_streak":return{val:(pld&&pld.streak)||0};
    case"journal":return{val:(jrnl&&jrnl.entries||[]).length};
    case"urge":return{val:(cd.log||[]).length};
    case"pledge":return{val:(pld&&pld.total)||0};
    case"tasks":return{val:totalDays};
    default:return{val:0};
  }
};

const getMissionDone=function(m,st,cd,jrnl,pld){
  var prog=getRouteMissionProgress(m.id,m.type,st,cd,jrnl,pld);
  if(m.type==="boss"){return(m.bossIds||[]).some(function(bid){return(st.beaten||[]).includes(bid);});}
  if(m.target)return prog.val>=m.target;
  return prog.val>=1;
};

const getStageProgress=function(stage,st,cd,jrnl,pld){
  var done=stage.missions.filter(function(m){return getMissionDone(m,st,cd,jrnl,pld);});
  return{done:done.length,total:stage.missions.length,pct:Math.round((done.length/stage.missions.length)*100)};
};

const getCurrentStage=function(st,cd,jrnl,pld){
  // Find the first incomplete stage
  for(var i=0;i<ROUTE_STAGES.length;i++){
    var prog=getStageProgress(ROUTE_STAGES[i],st,cd,jrnl,pld);
    if(prog.done<prog.total)return i;
  }
  return ROUTE_STAGES.length-1;
};

const isGoalDone=function(comp,goalId,dateStr){return !!(comp&&comp[goalId]&&comp[goalId][dateStr]);};
const toggleGoalComp=function(comp,goalId,dateStr){
  var nc=Object.assign({},comp);
  var g=Object.assign({},nc[goalId]||{});
  if(g[dateStr])delete g[dateStr];else g[dateStr]=true;
  nc[goalId]=g;
  return nc;
};
const getGoalWeekProgress=function(goal,comp){
  var days=last7();
  var done=days.filter(function(d){return isGoalDone(comp,goal.id,d);}).length;
  return{done:done,target:goal.target,days:days};
};
const getGoalStreak=function(goal,comp){
  var streak=0;
  for(var i=0;i<60;i++){
    var d=new Date();d.setDate(d.getDate()-i);
    if(isGoalDone(comp,goal.id,d.toDateString()))streak++;
    else if(i>0)break;
    else continue;
  }
  return streak;
};

const getTimeSaved=function(pld,cDays){
  var total=(cDays||0)+((pld&&pld.total)||0);
  var mins=((pld&&pld.savedMinutes)||30)*total;
  var hrs=Math.floor(mins/60);
  var money=((pld&&pld.savedMoney)||0)*total;
  return{mins:mins,hrs:hrs,money:money};
};
const formatTime=function(hrs){
  if(hrs<1)return"<1h";
  if(hrs<24)return hrs+"h";
  return Math.floor(hrs/24)+"d "+(hrs%24?hrs%24+"h":"");
};

// ── AI SUPPORT CHAT ───────────────────────────────────────────────────────
var AI_LINES=["You can get through this. The urge will pass.","What you feel is real — but it doesn't control you.","Breathe. In 4, hold 4, out 4. You've resisted before.","Your streak shows who you're becoming. Don't break it now.","This feeling is temporary. Your progress is permanent.","Every second you hold out makes the next one easier.","The urge is a wave. Waves peak and pass. Surf it.","You logged this. That means you're still in control."];
function AISupportChat({onClose,mot,cd,cDays}){
  var[msgs,setMsgs]=useState([]);
  var[input,setInput]=useState("");
  var[loading,setLoading]=useState(false);
  var bottomRef=useRef(null);
  var QUICK=[{label:"I have an urge",msg:"I'm feeling a strong urge and I need help right now."},{label:"I'm stressed",msg:"I'm really stressed and struggling to stay clean."},{label:"I almost gave in",msg:"I almost gave in just now but I'm still holding on."},{label:"Remind me why",msg:"Remind me why I started doing this."}];
  useEffect(function(){
    var opening="I'm here with you. "+(cDays>0?"You're "+cDays+" days clean — that matters. ":"")+"What's happening right now?";
    setMsgs([{role:"assistant",text:opening}]);
  },[]);
  useEffect(function(){if(bottomRef.current)bottomRef.current.scrollIntoView({behavior:"smooth"});},[msgs,loading]);
  var send=async function(override){
    var msg=override||input.trim();
    if(!msg||loading)return;
    setInput("");
    var newMsgs=msgs.concat([{role:"user",text:msg}]);
    setMsgs(newMsgs);
    setLoading(true);
    try{
      var sys="You are a supportive recovery coach in a habit app. The user may be experiencing an urge. Keep replies SHORT — 1 to 3 sentences max. Be warm, direct, practical. Never preachy. "+
        "Clean days: "+cDays+". Total urges resisted: "+((cd&&cd.totalResisted)||0)+"."+
        (mot&&mot.why?" Their stated reason: "+mot.why:"");
      var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,system:sys,
          messages:newMsgs.map(function(m){return{role:m.role,content:m.text};})})});
      var data=await res.json();
      var reply=(data.content&&data.content[0]&&data.content[0].text)||AI_LINES[Math.floor(Math.random()*AI_LINES.length)];
      setMsgs(function(m){return m.concat([{role:"assistant",text:reply}]);});
    }catch(e){
      setMsgs(function(m){return m.concat([{role:"assistant",text:AI_LINES[Math.floor(Math.random()*AI_LINES.length)]}]);});
    }
    setLoading(false);
  };
  return(
    <div style={{position:"fixed",inset:0,background:P.bg,zIndex:9700,display:"flex",flexDirection:"column",maxWidth:430,margin:"0 auto"}} className="fadeIn">
      <style>{CSS}</style>
      <div style={{padding:"12px 16px",borderBottom:"1px solid "+P.border,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:P.surface}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:P.purple+"25",border:"1px solid "+P.purple+"40",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🤖</div>
          <div>
            <div style={{fontSize:13,fontWeight:700}}>Support Chat</div>
            <div style={{fontFamily:F.mono,fontSize:8,color:P.green}}>available 24/7</div>
          </div>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:P.muted,cursor:"pointer",fontSize:22}}>x</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 14px",display:"flex",flexDirection:"column",gap:10}}>
        {msgs.map(function(m,i){
          var isAI=m.role==="assistant";
          return(
            <div key={i} style={{display:"flex",justifyContent:isAI?"flex-start":"flex-end"}}>
              <div style={{maxWidth:"82%",background:isAI?P.card:P.purple+"20",border:"1px solid "+(isAI?P.border:P.purple+"40"),borderRadius:isAI?"4px 12px 12px 12px":"12px 4px 12px 12px",padding:"10px 14px"}}>
                <div style={{fontSize:13,color:isAI?P.text:"#e9d5ff",lineHeight:1.6}}>{m.text}</div>
              </div>
            </div>
          );
        })}
        {loading&&<div style={{display:"flex",justifyContent:"flex-start"}}><div style={{background:P.card,border:"1px solid "+P.border,borderRadius:"4px 12px 12px 12px",padding:"12px 16px",display:"flex",gap:5,alignItems:"center"}}>{[0,1,2].map(function(i){return <div key={i} style={{width:6,height:6,borderRadius:"50%",background:P.muted,animation:"pulse 1.4s ease infinite",animationDelay:(i*0.2)+"s"}}/>;})}</div></div>}
        <div ref={bottomRef}/>
      </div>
      {msgs.length<=1&&!loading&&(
        <div style={{padding:"0 14px 10px",display:"flex",gap:6,flexWrap:"wrap"}}>
          {QUICK.map(function(q){return(<button key={q.label} className="tap" onClick={function(){send(q.msg);}} style={{background:P.purple+"10",border:"1px solid "+P.purple+"30",borderRadius:20,padding:"6px 12px",fontFamily:F.mono,fontSize:8,color:P.purple,cursor:"pointer"}}>{q.label}</button>);})}
        </div>
      )}
      <div style={{padding:"10px 14px 20px",borderTop:"1px solid "+P.border,background:P.surface,display:"flex",gap:8,flexShrink:0}}>
        <input value={input} onChange={function(e){setInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder="Type anything..." style={{flex:1,background:P.card,border:"1px solid "+P.border,color:P.text,borderRadius:20,padding:"10px 16px",fontSize:13,outline:"none"}}/>
        <button className="tap" onClick={function(){send();}} disabled={!input.trim()||loading}
          style={{background:input.trim()&&!loading?P.purple:P.dim,color:input.trim()&&!loading?"#fff":P.muted,border:"none",borderRadius:"50%",width:40,height:40,cursor:input.trim()&&!loading?"pointer":"default",fontSize:16,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>&#9656;</button>
      </div>
    </div>
  );
}

function AccountabilityModal({acc,onSave,onClose,st,cd,pld,cDays,cdLog}){

  var[contact,setContact]=useState(acc.partnerContact||"");
  var[isPrivate,setIsPrivate]=useState(acc.isPrivate!==false);
  var[showReport,setShowReport]=useState(false);
  var patterns=getTriggerPatterns(cdLog);
  var report=generateReport(st,cd,pld,cDays,patterns);
  var copyReport=function(){
    if(navigator.clipboard){navigator.clipboard.writeText(report).then(function(){alert("Report copied to clipboard!");}).catch(function(){});}
    else{var ta=document.createElement("textarea");ta.value=report;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);alert("Copied!");}
  };
  var shareReport=function(){
    if(navigator.share){navigator.share({title:"My Recovery Report",text:report}).catch(function(){});}
    else copyReport();
  };

// ── TRIGGER ANALYSIS PANEL ────────────────────────────────────────────────
function TriggerAnalysis({cdLog,nd}){
  var patterns=getTriggerPatterns(cdLog);
  if(!patterns||patterns.total<5){
    return(
      <div style={{background:P.card,border:"1px solid "+P.border,borderRadius:10,padding:"16px",textAlign:"center",marginBottom:14}}>
        <div style={{fontSize:24,marginBottom:8}}>🔬</div>
        <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Patterns unlock at 5 urges</div>
        <div style={{fontSize:11,color:P.muted}}>Log {5-(patterns?patterns.total:0)} more urges to reveal your patterns.</div>
      </div>
    );
  }
  var todSlots=[{key:"morning",icon:"🌅",label:"Morning"},{key:"afternoon",icon:"☀",label:"Afternoon"},{key:"evening",icon:"🌆",label:"Evening"},{key:"night",icon:"🌙",label:"Night"}];
  var maxTod=Math.max.apply(null,todSlots.map(function(s){return patterns.byTod[s.key]||0;}));
  var ctxEntries=Object.entries(patterns.byCtx).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  return(
    <div style={{marginBottom:14}}>
      <Lbl text="YOUR TRIGGER PATTERNS"/>
      {/* Win rate */}
      <div style={{background:P.card,border:"1px solid "+P.border,borderRadius:10,padding:"14px",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div>
            <div style={{fontFamily:F.mono,fontSize:9,color:P.muted,letterSpacing:2,marginBottom:2}}>WIN RATE</div>
            <div style={{fontSize:26,fontWeight:900,color:patterns.winRate>=70?P.green:patterns.winRate>=50?P.gold:P.red}}>{patterns.winRate}%</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:F.mono,fontSize:9,color:P.green}}>{patterns.wins} won</div>
            <div style={{fontFamily:F.mono,fontSize:9,color:P.red}}>{patterns.total-patterns.wins} slipped</div>
            <div style={{fontFamily:F.mono,fontSize:8,color:P.muted,marginTop:2}}>last 60 events</div>
          </div>
        </div>
        <div style={{height:8,background:P.dim,borderRadius:4,overflow:"hidden"}}>
          <div style={{height:"100%",background:"linear-gradient(90deg,"+P.green+"80,"+P.green+")",width:patterns.winRate+"%",borderRadius:4,transition:"width 1s ease"}}/>
        </div>
      </div>
      {/* Time of day */}
      <div style={{background:P.card,border:"1px solid "+P.border,borderRadius:10,padding:"14px",marginBottom:8}}>
        <div style={{fontFamily:F.mono,fontSize:9,color:P.muted,letterSpacing:2,marginBottom:10}}>VULNERABILITY WINDOWS</div>
        {todSlots.map(function(s){
          var v=patterns.byTod[s.key]||0;
          var pct=maxTod>0?Math.round((v/maxTod)*100):0;
          var isRisk=s.key===patterns.topTod[0];
          return(
            <div key={s.key} style={{display:"grid",gridTemplateColumns:"90px 1fr 28px",gap:8,alignItems:"center",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:13}}>{s.icon}</span>
                <span style={{fontSize:11,fontWeight:isRisk?700:400,color:isRisk?P.red:P.text}}>{s.label}</span>
              </div>
              <div style={{height:8,background:P.dim,borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",background:isRisk?"linear-gradient(90deg,"+P.red+"80,"+P.red+")":"linear-gradient(90deg,"+P.gold+"50,"+P.gold+")",width:pct+"%",borderRadius:4}}/>
              </div>
              <span style={{fontFamily:F.mono,fontSize:9,color:isRisk?P.red:P.muted,textAlign:"right",fontWeight:isRisk?700:400}}>{v}</span>
            </div>
          );
        })}
        {patterns.topTod&&<div style={{background:P.red+"08",border:"1px solid "+P.red+"20",borderRadius:6,padding:"7px 10px",marginTop:4}}>
          <span style={{fontSize:11,color:P.red}}>⚠ You&#39;re most vulnerable in the <strong>{patterns.topTod[0]}</strong>. Plan around this.</span>
        </div>}
      </div>
      {/* Triggers */}
      {ctxEntries.length>0&&(
        <div style={{background:P.card,border:"1px solid "+P.border,borderRadius:10,padding:"14px",marginBottom:8}}>
          <div style={{fontFamily:F.mono,fontSize:9,color:P.muted,letterSpacing:2,marginBottom:10}}>EMOTIONAL TRIGGERS</div>
          {ctxEntries.map(function(e,i){
            var pct=Math.round((e[1]/patterns.total)*100);
            var cols=["#ef4444","#f97316","#f59e0b","#10b981","#3b82f6"];
            var col=cols[i]||P.muted;
            return(
              <div key={e[0]} style={{display:"grid",gridTemplateColumns:"70px 1fr 36px",gap:8,alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:11,fontWeight:i===0?700:400,color:i===0?col:P.muted,textTransform:"capitalize"}}>{e[0]}</span>
                <div style={{height:6,background:P.dim,borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",background:col,width:pct+"%",borderRadius:3}}/>
                </div>
                <span style={{fontFamily:F.mono,fontSize:9,color:col,textAlign:"right"}}>{e[1]}x</span>
              </div>
            );
          })}
          {patterns.topBreaker&&<div style={{background:P.gold+"08",border:"1px solid "+P.gold+"20",borderRadius:6,padding:"7px 10px",marginTop:6}}>
            <span style={{fontSize:11,color:P.gold}}>💡 When you feel <strong>{patterns.topBreaker}</strong>, have a plan ready.</span>
          </div>}
        </div>
      )}
    </div>
  );
}

// ── MULTI-HABIT SWITCHER ──────────────────────────────────────────────────
function HabitSwitcherModal({hb,onSave,onClose}){
  var[habits,setHabits]=useState(hb.habits||[{id:"main",label:"Main Habit",icon:"🎯",active:true}]);
  var[adding,setAdding]=useState(false);
  var[customLabel,setCustomLabel]=useState("");
  var addHabit=function(tmpl){
    var exists=habits.find(function(h){return h.id===tmpl.id;});
    if(exists){setAdding(false);return;}
    var nh=habits.concat([{id:tmpl.id,label:tmpl.label,icon:tmpl.icon,active:false,start:null,log:[]}]);
    setHabits(nh);setAdding(false);setCustomLabel("");
  };
  var removeHabit=function(id){
    if(id==="main")return; // can't remove main
    setHabits(habits.filter(function(h){return h.id!==id;}));
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",zIndex:9600,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:P.surface,border:"1px solid "+P.border,borderRadius:"16px 16px 0 0",padding:24,width:"100%",maxWidth:430,paddingBottom:40,maxHeight:"90vh",overflowY:"auto"}} onClick={function(e){e.stopPropagation();}} className="slideUp">
        <style>{CSS}</style>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
          <div>
            <div style={{fontFamily:F.mono,fontSize:10,color:P.purple,letterSpacing:2}}>HABITS</div>
            <div style={{fontFamily:F.mono,fontSize:8,color:P.muted,marginTop:2}}>Track multiple habits independently</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:P.muted,cursor:"pointer",fontSize:20}}>x</button>
        </div>
        <div style={{fontSize:12,color:P.muted,marginBottom:16,lineHeight:1.6}}>
          Each habit has its own streak, urge log, and progress. Tap any habit to make it active.
        </div>

        {/* Current habits */}
        {habits.map(function(h){
          var isMain=h.id==="main";
          return(
            <div key={h.id} style={{background:P.card,border:"1px solid "+P.border,borderRadius:10,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:36,height:36,borderRadius:8,background:P.purple+"15",border:"1px solid "+P.purple+"30",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{h.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600}}>{h.label}</div>
                <div style={{fontFamily:F.mono,fontSize:8,color:P.muted,marginTop:1}}>{isMain?"Primary habit":"Secondary tracking"}</div>
              </div>
              {!isMain&&(
                <button className="tap" onClick={function(){removeHabit(h.id);}}
                  style={{background:"none",border:"none",color:P.red,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
              )}
              {isMain&&<span style={{fontFamily:F.mono,fontSize:8,color:P.gold}}>PRIMARY</span>}
            </div>
          );
        })}

        {!adding&&habits.length<5&&(
          <button className="tap" onClick={function(){setAdding(true);}}
            style={{width:"100%",background:P.purple+"08",border:"1px dashed "+P.purple+"40",borderRadius:10,padding:"12px",cursor:"pointer",color:P.purple,fontFamily:F.mono,fontSize:9,letterSpacing:1,marginBottom:16}}>
            + ADD HABIT TO TRACK
          </button>
        )}

        {adding&&(
          <div style={{background:P.card,border:"1px solid "+P.border,borderRadius:10,padding:"14px",marginBottom:16}}>
            <div style={{fontFamily:F.mono,fontSize:9,color:P.muted,letterSpacing:2,marginBottom:10}}>CHOOSE HABIT</div>
            {HABIT_TEMPLATES.filter(function(t){return !habits.find(function(h){return h.id===t.id&&t.id!=="custom";});}).map(function(tmpl){
              if(tmpl.id==="custom"){
                return(
                  <div key="custom">
                    <input value={customLabel} onChange={function(e){setCustomLabel(e.target.value);}}
                      placeholder="Custom habit name..."
                      style={{width:"100%",background:P.surface,border:"1px solid "+P.border,color:P.text,borderRadius:7,padding:"9px 12px",fontSize:13,outline:"none",marginBottom:8}}/>
                    {customLabel.trim()&&<button className="tap" onClick={function(){addHabit({id:"custom_"+Date.now(),label:customLabel.trim(),icon:"⚡"});}}
                      style={{width:"100%",background:P.purple,color:"#fff",border:"none",borderRadius:7,padding:"9px 0",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:6}}>Add "{customLabel.trim()}"</button>}
                  </div>
                );
              }
              return(
                <button key={tmpl.id} className="tap" onClick={function(){addHabit(tmpl);}}
                  style={{width:"100%",background:P.surface,border:"1px solid "+P.border,borderRadius:8,padding:"10px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,marginBottom:6,textAlign:"left"}}>
                  <span style={{fontSize:18}}>{tmpl.icon}</span>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{tmpl.label}</div><div style={{fontFamily:F.mono,fontSize:8,color:P.muted}}>{tmpl.desc}</div></div>
                </button>
              );
            })}
            <button className="tap" onClick={function(){setAdding(false);}}
              style={{width:"100%",background:"none",border:"1px solid "+P.border,color:P.muted,borderRadius:7,padding:"8px 0",fontSize:12,cursor:"pointer",marginTop:4}}>Cancel</button>
          </div>
        )}

        <button className="tap" onClick={function(){onSave({habits:habits,activeId:hb.activeId||"main"});}}
          style={{width:"100%",background:P.purple,color:"#fff",border:"none",borderRadius:8,padding:"13px 0",fontSize:14,fontWeight:700,cursor:"pointer"}}>Save</button>
      </div>
    </div>
  );
}

  {name:"Day 12",streak:12,msg:"Had my worst urge in weeks tonight. Walked around the block 3 times. Still standing."},
  {name:"Week 3",streak:21,msg:"My sleep has been better this week. The boring bedtime rule actually helped."},

  {name:"Week 1",streak:7,msg:"Finished my first week. Reward: actually enjoyed dinner with my family tonight. Fully present."},
  {name:"Day 33",streak:33,msg:"Confidence is coming from keeping promises. I started talking to people I would have avoided before."},

  {name:"Day 5",streak:5,msg:"5 days. Yesterday I thought it was over. Today I'm still here. That's all it takes."},
];
function CommunityFeed({cDays,cd,onClose}){
  var[posts,setPosts]=useState(null);
  var[loading,setLoading]=useState(true);
  var[shareOpen,setShareOpen]=useState(false);
  var[shareMsg,setShareMsg]=useState("");
  var[sharing,setSharing]=useState(false);
  var[shared,setShared]=useState(false);

  useEffect(function(){
    var load=async function(){
      try{
        var prompt="Generate 6 short, anonymous, realistic recovery progress posts from different people at different stages (days 3, 9, 18, 35, 65, 90). Each should feel raw and real — not motivational poster content. Format as JSON array: [{name:\"Day X\",streak:N,msg:\"...\"}]. Msgs should be 1-2 sentences, personal, specific. No clichés. Return ONLY the JSON array.";
        var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:prompt}]})});
        var data=await res.json();
        var text=data.content&&data.content[0]&&data.content[0].text||"";
        var clean=text.replace(/```json|```/g,"").trim();
        var parsed=JSON.parse(clean);
        setPosts(parsed);
      }catch(e){setPosts(COMMUNITY_FALLBACKS.slice(0,6));}
      setLoading(false);
    };
    load();
  },[]);

  var doShare=async function(){
    if(!shareMsg.trim())return;
    setSharing(true);
    await new Promise(function(r){setTimeout(r,800);}); // simulate
    setSharing(false);setShared(true);setShareOpen(false);
    setTimeout(function(){setShared(false);},3000);
  };

  var displayPosts=posts||COMMUNITY_FALLBACKS.slice(0,6);
  return(
    <div style={{position:"fixed",inset:0,background:P.bg,zIndex:9700,display:"flex",flexDirection:"column",maxWidth:430,margin:"0 auto"}} className="fadeIn">
      <style>{CSS}</style>
      <div style={{padding:"12px 16px",borderBottom:"1px solid "+P.border,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:P.surface}}>
        <div>
          <div style={{fontSize:13,fontWeight:700}}>Community</div>
          <div style={{fontFamily:F.mono,fontSize:8,color:P.muted}}>anonymous &middot; private &middot; read-only</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button className="tap" onClick={function(){setShareOpen(true);}}
            style={{background:P.purple+"15",border:"1px solid "+P.purple+"30",color:P.purple,borderRadius:6,padding:"5px 10px",fontFamily:F.mono,fontSize:8,cursor:"pointer"}}>SHARE</button>
          <button onClick={onClose} style={{background:"none",border:"none",color:P.muted,cursor:"pointer",fontSize:22}}>x</button>
        </div>
      </div>
      {shared&&<div style={{background:P.green+"10",borderBottom:"1px solid "+P.green+"25",padding:"8px 16px",fontFamily:F.mono,fontSize:9,color:P.green,textAlign:"center"}}>Your note was shared anonymously ✓</div>}
      <div style={{flex:1,overflowY:"auto",padding:"14px 14px"}}>
        {loading&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:P.muted}}>
            <div style={{fontSize:24,marginBottom:12}}>👥</div>
            <div style={{fontFamily:F.mono,fontSize:9,letterSpacing:2}}>LOADING COMMUNITY...</div>
          </div>
        )}
        {!loading&&(
          <div>
            {cDays>0&&(
              <div style={{background:"linear-gradient(135deg,"+P.purple+"0a,"+P.card+")",border:"1px solid "+P.purple+"25",borderRadius:10,padding:"12px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>👤</span>
                <div style={{flex:1}}>
                  <div style={{fontFamily:F.mono,fontSize:8,color:P.purple,letterSpacing:2,marginBottom:2}}>YOU — DAY {cDays}</div>
                  <div style={{fontSize:12,color:P.muted}}>You are in this too. {(cd.totalResisted||0)} urges resisted.</div>
                </div>
              </div>
            )}
            {displayPosts.map(function(p,i){
              var col=["#94a3b8","#10b981","#3b82f6","#f59e0b","#ef4444","#a855f7"][i%6];
              return(
                <div key={i} style={{background:P.card,border:"1px solid "+P.border,borderRadius:10,padding:"14px",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:col+"25",border:"1px solid "+col+"40",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F.mono,fontSize:9,color:col,fontWeight:700,flexShrink:0}}>

                </div>
              );
            })}
            <div style={{textAlign:"center",padding:"16px 0",fontFamily:F.mono,fontSize:8,color:P.dim}}>All posts are anonymous. No accounts. No tracking.</div>
          </div>
        )}

function XPBar({st}){
  var tLvl=Object.values(st.stats).reduce(function(a,v){return a+v.level;},0);
  var rank=getRank(tLvl);
  var nextRank=RANKS.find(function(r){return r.min>tLvl;})||null;
  var prevMin=rank.min;
  var nextMin=nextRank?nextRank.min:prevMin+10;
  var pct=nextRank?Math.min(((tLvl-prevMin)/(nextMin-prevMin))*100,100):100;
  return(
    <div style={{padding:"10px 14px 12px",background:"rgba(7,10,15,.74)",borderBottom:"1px solid rgba(255,255,255,.06)",backdropFilter:"blur(14px)"}}>

function UrgeHeatmap({log}){
  var safeLog=log||[];
  var dist=getUrgeHourDist(safeLog);
  var maxVal=Math.max(dist.night,dist.morning,dist.afternoon,dist.evening,1);
  var total=dist.night+dist.morning+dist.afternoon+dist.evening;
  var slots=[
    {key:"night",label:"Night",sub:"10pm-6am",icon:"🌙"},
    {key:"morning",label:"Morning",sub:"6am-12pm",icon:"🌅"},
    {key:"afternoon",label:"Afternoon",sub:"12-5pm",icon:"☀"},
    {key:"evening",label:"Evening",sub:"5-10pm",icon:"🌆"},
  ];
  if(total===0){
    return(
      <div style={{marginBottom:14}}>
        <Lbl text="URGE PATTERNS"/>
        <div style={{background:P.card,border:"1px solid "+P.border,borderRadius:8,padding:"14px",textAlign:"center"}}>
          <div style={{fontSize:12,color:P.muted}}>Log urges to reveal your vulnerability patterns.</div>
        </div>
      </div>
    );
  }
  return(
    <div style={{marginBottom:14}}>
      <Lbl text="URGE PATTERNS" right={total+" logged"}/>
      <div style={{background:P.card,border:"1px solid "+P.border,borderRadius:10,padding:"14px 16px"}}>
        {slots.map(function(s){
          var v=dist[s.key]||0;
          var pct=Math.round((v/maxVal)*100);
          var isWorst=v===maxVal&&v>0;
          var barCol=isWorst?"linear-gradient(90deg,"+P.red+"80,"+P.red+")":"linear-gradient(90deg,"+P.gold+"60,"+P.gold+")";
          return(
            <div key={s.key} style={{display:"grid",gridTemplateColumns:"84px 1fr 28px",gap:8,alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <span style={{fontSize:11}}>{s.icon}</span>
                <div>
                  <div style={{fontSize:11,fontWeight:600,color:isWorst?P.red:P.text}}>{s.label}</div>
                  <div style={{fontFamily:F.mono,fontSize:7,color:P.muted}}>{s.sub}</div>
                </div>
              </div>
              <div style={{height:10,background:P.dim,borderRadius:5,overflow:"hidden"}}>
                <div style={{height:"100%",background:barCol,width:pct+"%",borderRadius:5,transition:"width .8s ease"}}/>
              </div>
              <div style={{fontFamily:F.mono,fontSize:9,color:isWorst?P.red:P.muted,textAlign:"right",fontWeight:isWorst?700:400}}>{v}</div>
            </div>
          );
        })}
        {(function(){
          var worst=slots.find(function(s){return dist[s.key]===maxVal&&maxVal>0;});
          if(!worst)return null;
          return(
            <div style={{background:P.red+"08",border:"1px solid "+P.red+"20",borderRadius:6,padding:"8px 10px",marginTop:4}}>
              <span style={{fontFamily:F.mono,fontSize:9,color:P.red}}>Most urges: {worst.label.toLowerCase()}. Plan around this window.</span>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

              <svg width="180" height="180" style={{transform:"rotate(-90deg)"}}>
                <circle cx="90" cy="90" r="80" fill="none" stroke={P.dim} strokeWidth="8"/>

              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{fontFamily:F.mono,fontSize:38,fontWeight:700,color:P.blue}}>{(m<10?"0":"")+m+":"+(s<10?"0":"")+s}</div>

function CalendarModal({hist,cdLog,nd,onClose,goals,comp,onToggleGoal}){
  var now=new Date();

  var[year,setYear]=useState(now.getFullYear());
  var[selectedDs,setSelectedDs]=useState(null);
  var relapseDays={};
  var urgeDaySet={};
  (cdLog||[]).forEach(function(e){
    var d=new Date(e.ts).toDateString();
    if(!e.won)relapseDays[d]=true;
    else urgeDaySet[d]=true;
  });
  var cleanSet={};
  (hist||[]).forEach(function(d){cleanSet[d]=true;});
  var MNAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var DNAMES=["Su","Mo","Tu","We","Th","Fr","Sa"];
  var firstDow=new Date(year,month,1).getDay();
  var daysInMonth=new Date(year,month+1,0).getDate();
  var todayDs=new Date().toDateString();
  var cells=[];
  for(var i=0;i<firstDow;i++)cells.push(null);
  for(var d=1;d<=daysInMonth;d++){cells.push({d:d,ds:new Date(year,month,d).toDateString()});}
  var hasGoals=goals&&goals.length>0;
  var selectedDate=selectedDs?new Date(selectedDs):null;
  var selectedIsFuture=selectedDate&&selectedDate>new Date(new Date().toDateString());

    <div style={{position:"fixed",inset:0,background:P.bg,zIndex:9500,display:"flex",flexDirection:"column",maxWidth:430,margin:"0 auto"}} className="slideUp">

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <button className="tap" onClick={function(){setSelectedDs(null);if(month===0){setMonth(11);setYear(function(y){return y-1;});}else setMonth(function(m){return m-1;});}} style={{color:P.muted,fontSize:18,padding:"4px 10px",background:P.card,border:"1px solid "+P.border,borderRadius:6,cursor:"pointer"}}>&lt;</button>
          <span style={{fontWeight:700,fontSize:16}}>{MNAMES[month]} {year}</span>
          <button className="tap" onClick={function(){setSelectedDs(null);if(month===11){setMonth(0);setYear(function(y){return y+1;});}else setMonth(function(m){return m+1;});}} style={{color:P.muted,fontSize:18,padding:"4px 10px",background:P.card,border:"1px solid "+P.border,borderRadius:6,cursor:"pointer"}}>&gt;</button>
        </div>

        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:16}}>
          {cells.map(function(cell,i){
            if(!cell)return <div key={i}/>;
            var d=cell.d,ds=cell.ds;
            var isToday=ds===todayDs;
            var isClean=!!cleanSet[ds];
            var hasRelapse=!!relapseDays[ds];
            var hasUrge=!!urgeDaySet[ds];
            var isFuture=new Date(year,month,d)>new Date();

            return(
              <button key={i} className="tap" onClick={function(){if(!isFuture)setSelectedDs(isSelected?null:ds);}}

                {(hasUrge||hasRelapse)&&!isFuture&&(
                  <div style={{display:"flex",gap:2,position:"absolute",bottom:2}}>
                    {hasUrge&&<div style={{width:4,height:4,borderRadius:"50%",background:P.green}}/>}
                    {hasRelapse&&<div style={{width:4,height:4,borderRadius:"50%",background:P.red}}/>}

                {goalDots.length>0&&(
                  <div style={{display:"flex",gap:1.5,position:"absolute",top:1,left:1,flexWrap:"wrap",maxWidth:14}}>
                    {goalDots.slice(0,3).map(function(g){return <div key={g.id} style={{width:3.5,height:3.5,borderRadius:"50%",background:g.col}}/>;})}

            );

        </div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
          {[{col:P.gold,label:"Core done"},{col:P.green,label:"Urge won"},{col:P.red,label:"Slip"}].map(function(l){

                <span style={{fontFamily:F.mono,fontSize:8,color:P.muted}}>{l.label}</span>
              </div>
            );
          })}
          <div style={{display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:9}}>😊</span><span style={{fontFamily:F.mono,fontSize:8,color:P.muted}}>Mood</span></div>
          {hasGoals&&<div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:6,height:6,borderRadius:"50%",background:P.purple}}/><span style={{fontFamily:F.mono,fontSize:8,color:P.muted}}>Goal done</span></div>}
        </div>

        {/* Day detail panel — goal checklist for selected date */}
        {selectedDs&&hasGoals&&!selectedIsFuture&&(
          <div style={{background:P.card,border:"1px solid "+P.purple+"35",borderRadius:10,padding:"14px",marginBottom:14}} className="fadeIn">
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <span style={{fontFamily:F.mono,fontSize:9,color:P.purple,letterSpacing:1}}>{new Date(selectedDs).toLocaleDateString("en",{weekday:"long",month:"short",day:"numeric"}).toUpperCase()}</span>
              <button onClick={function(){setSelectedDs(null);}} style={{background:"none",border:"none",color:P.muted,cursor:"pointer",fontSize:16}}>x</button>
            </div>
            {goals.map(function(g){
              var done=isGoalDone(comp,g.id,selectedDs);
              return(
                <button key={g.id} className="tap" onClick={function(){onToggleGoal(g.id,selectedDs);}}
                  style={{width:"100%",background:done?g.col+"15":P.surface,border:"1px solid "+(done?g.col+"40":P.border),borderRadius:8,padding:"10px 12px",marginBottom:6,cursor:"pointer",display:"flex",alignItems:"center",gap:10,textAlign:"left"}}>

                </button>

function WeeklyReport({hist,cd,onClose}){
  var days7=last7();
  var perfDays=days7.filter(function(d){return hist.includes(d);}).length;
  var wk=weekKey();
  var cw=(cd.weekData||{})[wk]||{u:0,r:0,s:0};
  var resistRate=cw.u>0?cw.r/cw.u:1;
  var score=(perfDays/7)*50+(resistRate)*30+(cw.s===0?20:cw.s===1?10:0);
  var grade=score>=85?"A":score>=65?"B":score>=45?"C":"D";
  var label=score>=85?"Excellent Week":score>=65?"Solid Week":score>=45?"Average Week":"Tough Week";
  var col=score>=85?P.green:score>=65?P.gold:score>=45?"#f97316":P.red;
  var msg=score>=85?"You showed up and dominated. This is what discipline looks like.":score>=65?"More good than bad. Build on this momentum.":score>=45?"You stayed in the game. Next week, push harder.":"Hard week — but you are still here. That matters.";
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(4,4,12,.97)",zIndex:9600,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={onClose}>
      <style>{CSS}</style>
      <div style={{background:P.card,border:"1px solid "+col+"40",borderRadius:16,padding:28,maxWidth:360,width:"100%",textAlign:"center"}} onClick={function(e){e.stopPropagation();}} className="popIn">
        <div style={{fontFamily:F.mono,fontSize:8,color:P.muted,letterSpacing:4,marginBottom:16}}>WEEKLY REPORT</div>
        <div style={{width:100,height:100,borderRadius:"50%",background:col+"15",border:"3px solid "+col+"60",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
          <span style={{fontFamily:F.mono,fontSize:52,fontWeight:900,color:col,lineHeight:1}}>{grade}</span>
        </div>
        <div style={{fontSize:18,fontWeight:800,color:col,marginBottom:8}}>{label}</div>
        <div style={{fontSize:12,color:P.muted,lineHeight:1.7,marginBottom:20}}>{msg}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:20}}>
          {[{l:"PERFECT DAYS",v:perfDays+"/7",col:P.gold},{l:"URGES WON",v:cw.r||0,col:P.green},{l:"SLIPS",v:cw.s||0,col:P.red}].map(function(s){
            return(
              <div key={s.l} style={{background:P.surface,border:"1px solid "+P.border,borderRadius:8,padding:"10px 6px"}}>
                <div style={{fontFamily:F.mono,fontSize:18,fontWeight:700,color:s.col}}>{s.v}</div>
                <div style={{fontFamily:F.mono,fontSize:7,color:P.muted,marginTop:3}}>{s.l}</div>
              </div>
            );
          })}
        </div>
        <button className="tap" onClick={onClose} style={{width:"100%",background:col,color:"#000",border:"none",borderRadius:8,padding:"12px 0",fontSize:14,fontWeight:700,cursor:"pointer"}}>Close</button>
      </div>
    </div>
  );
}

function PowerHourModal({onComplete,onClose}){
  var DURATION=3600;
  var[t,setT]=useState(DURATION);
  var[running,setRunning]=useState(false);
  var[done,setDone]=useState(false);
  var pct=((DURATION-t)/DURATION)*100;
  var m=Math.floor(t/60),s=t%60;
  var circ=2*Math.PI*90;
  useEffect(function(){
    if(!running||done||t<=0)return;
    var id=setTimeout(function(){setT(function(v){return v-1;});},1000);
    return function(){clearTimeout(id);};
  },[t,running,done]);
  useEffect(function(){if(t<=0&&running){setDone(true);setRunning(false);}},[t]);
  return(
    <div style={{position:"fixed",inset:0,background:P.bg,zIndex:9700,display:"flex",flexDirection:"column",maxWidth:430,margin:"0 auto"}} className="fadeIn">
      <style>{CSS}</style>
      <div style={{padding:"14px 16px",borderBottom:"1px solid "+P.border,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <span style={{fontFamily:F.mono,fontSize:10,color:P.gold,letterSpacing:2}}>POWER HOUR</span>
        <button onClick={onClose} style={{background:"none",border:"none",color:P.muted,cursor:"pointer",fontSize:22}}>x</button>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32}}>
        {!done?(
          <div style={{textAlign:"center",width:"100%"}}>
            <div style={{fontFamily:F.mono,fontSize:9,color:P.muted,letterSpacing:3,marginBottom:28}}>DEEP FOCUS SESSION</div>
            <div style={{position:"relative",width:220,height:220,margin:"0 auto 28px"}}>
              <svg width="220" height="220" style={{transform:"rotate(-90deg)"}}>
                <circle cx="110" cy="110" r="90" fill="none" stroke={P.dim} strokeWidth="8"/>
                <circle cx="110" cy="110" r="90" fill="none" stroke={running?P.gold:P.border} strokeWidth="8"
                  strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} strokeLinecap="round"
                  style={{transition:"stroke-dashoffset .5s linear,stroke .3s"}}/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <div style={{fontFamily:F.mono,fontSize:42,fontWeight:700,color:running?P.gold:P.text,lineHeight:1}}>{(m<10?"0":"")+m+":"+(s<10?"0":"")+s}</div>
                <div style={{fontFamily:F.mono,fontSize:9,color:P.muted,marginTop:6,letterSpacing:2}}>{running?"FOCUS":"PAUSED"}</div>
              </div>
            </div>
            <div style={{fontSize:12,color:P.muted,marginBottom:28}}>No urges. No distractions. Just you and the work. <span style={{color:P.gold}}>+50 XP</span></div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button className="tap" onClick={function(){setRunning(function(r){return !r;});}}
                style={{background:running?P.surface:P.gold,border:"1px solid "+(running?P.border:P.gold),color:running?P.muted:"#000",borderRadius:8,padding:"13px 32px",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                {running?"Pause":"Start"}
              </button>
              <button className="tap" onClick={function(){setDone(true);setRunning(false);}}
                style={{background:"transparent",border:"1px solid "+P.border,color:P.muted,borderRadius:8,padding:"13px 20px",fontSize:13,fontWeight:600,cursor:"pointer"}}>End</button>
            </div>
          </div>
        ):(
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:52,marginBottom:16}}>⚡</div>
            <div style={{fontFamily:F.mono,fontSize:9,color:P.gold,letterSpacing:4,marginBottom:10}}>POWER HOUR COMPLETE</div>
            <div style={{fontSize:22,fontWeight:800,marginBottom:24}}>+50 XP Earned</div>
            <button className="tap" onClick={function(){onComplete();}}
              style={{width:"100%",background:P.gold,color:"#000",border:"none",borderRadius:8,padding:"14px 0",fontSize:15,fontWeight:700,cursor:"pointer"}}>Claim XP</button>
          </div>
        )}
      </div>
    </div>
  );
}

function getRiskPlan(cd,nd){
  var h=new Date().getHours();
  var trigger=getTrigger(cd.log);
  var patterns=getTriggerPatterns(cd.log);
  var moodId=nd&&nd.mood?nd.mood[todayStr()]:null;
  var prediction=null;
  if(patterns&&patterns.total>=5){
    var topTime=patterns.topTod&&patterns.topTod[0];
    var topCtx=patterns.topCtx&&patterns.topCtx[0];
    var ruleMap={
      night:"Phone outside the bedroom before 21:30.",
      evening:"Plan a workout, walk, or family-room activity after dinner.",
      afternoon:"Do not go alone to the danger room after school. Start a 15-minute task.",
      morning:"No private scrolling before school. Get dressed first."
    };
    prediction={
      title:"PREDICTED RISK",
      msg:"Your logs point to "+topTime+(topCtx?" + "+topCtx:"")+" as the danger pattern.",
      rule:ruleMap[topTime]||"Change rooms before the urge starts.",
      winRate:patterns.winRate,
      total:patterns.total
    };
  }
  if(h>=22||h<5)return{level:"high",col:P.red,title:"HIGH-RISK WINDOW",msg:"It is late. Do not negotiate with yourself. Put the phone outside the room, lights off, sleep.",rule:"Phone outside bedroom now.",prediction:prediction};
  if(trigger&&trigger.time)return{level:"watch",col:P.gold,title:"WATCH YOUR "+trigger.time.toUpperCase(),msg:"Your logs suggest this time window can become risky. Handle it before it becomes an urge.",rule:"Move rooms and start a replacement task.",prediction:prediction};
  if(moodId&&moodId<=2)return{level:"watch",col:"#f97316",title:"LOW MOOD TODAY",msg:"Bad mood can turn into escape behavior. Do something physical before the evening gets messy.",rule:"Walk, shower, or clean for 10 minutes.",prediction:prediction};
  return{level:"normal",col:P.blue,title:"TONIGHT PLAN",msg:"No major warning yet. Still, the boring rule wins: avoid private scrolling when tired.",rule:"Phone away 1 hour before sleep.",prediction:prediction};
}


function getFrictionState(xtra){

  var done=FRICTION_ITEMS.filter(function(i){return !!f[i.id];}).length;
  return{items:f,done:done,total:FRICTION_ITEMS.length,pct:Math.round(done/FRICTION_ITEMS.length*100)};
}
function getReplacementPlan(xtra){

}
function getCoachDiagnosis(cd,nd,xtra){
  var patterns=getTriggerPatterns(cd.log);
  var trigger=getTrigger(cd.log);
  var rep=getBestRep(cd);
  var moodId=nd&&nd.mood?nd.mood[todayStr()]:null;
  var replacement=getReplacementPlan(xtra);
  var total=(cd.totalResisted||0)+(cd.relCount||0);
  if(patterns&&patterns.total>=5){
    var ctx=patterns.topCtx&&patterns.topCtx[0]?patterns.topCtx[0]:"unknown trigger";
    var time=patterns.topTod&&patterns.topTod[0]?patterns.topTod[0]:"risky time";
    return{tag:"COACH DIAGNOSIS",col:P.gold,title:"Your pattern is "+time+" + "+ctx,msg:"Win rate: "+patterns.winRate+"%. Your next upgrade is not motivation. It is a rule before this window starts.",rule:"Before "+time+", do: "+replacement.label+"."};
  }
  if(moodId&&moodId<=2)return{tag:"MOOD WARNING",col:"#f97316",title:"Low mood can become escape",msg:"You logged a rough mood today. Do something physical before night.",rule:"Use "+replacement.label+" before scrolling."};
  if(trigger)return{tag:"EARLY PATTERN",col:P.blue,title:"Watch the "+trigger.time,msg:"You have logged enough to see an early pattern. Keep logging honestly.",rule:"When it hits, use "+replacement.label+" first."};
  if(rep)return{tag:"BEST TOOL",col:P.green,title:rep.label+" works for you",msg:"You have used this tool successfully before. Do not overthink it.",rule:"Use "+rep.label+" as your first response."};
  return{tag:"COACH SETUP",col:P.purple,title:"Collect honest data",msg:"The app gets smarter after you log urges, wins, and slips.",rule:"Tonight: log the urge before judging yourself."};
}
function getRealMissionPack(xtra,cd){
  var h=dHash(todayStr()+"real");
  var risk=getWorstHeatmapCell(cd.log);
  var preferred=[];
  if(risk&&risk.slot==="night")preferred=["bed_setup","family_room","room_reset"];
  else if(risk&&risk.slot==="afternoon")preferred=["outdoor15","skill25","text_friend"];
  else preferred=["outdoor15","train_short","skill25"];
  var list=[];
  preferred.forEach(function(id){var m=REAL_MISSION_POOL.find(function(x){return x.id===id;});if(m)list.push(m);});
  for(var i=0;list.length<3&&i<REAL_MISSION_POOL.length;i++){
    var m=REAL_MISSION_POOL[(h+i*3)%REAL_MISSION_POOL.length];
    if(!list.some(function(x){return x.id===m.id;}))list.push(m);
  }
  return list.slice(0,3);
}

function PanicTimer({duration,onDone}){
  var T=duration||600;
  var[t,setT]=useState(T);
  useEffect(function(){
    if(t<=0){onDone&&onDone();return;}
    var id=setTimeout(function(){setT(function(v){return Math.max(0,v-1);});},1000);
    return function(){clearTimeout(id);};
  },[t]);
  var m=Math.floor(t/60),s=t%60,pct=((T-t)/T)*100;
  return(
    <div style={{width:"100%",textAlign:"center"}}>
      <div style={{fontFamily:F.mono,fontSize:70,fontWeight:900,color:P.red,lineHeight:1,marginBottom:12}}>{(m<10?"0":"") + m + ":" + (s<10?"0":"") + s}</div>
      <div style={{height:6,background:P.dim,borderRadius:3,overflow:"hidden",margin:"0 auto 18px",maxWidth:260}}><div style={{height:"100%",background:P.red,width:pct+"%",transition:"width 1s linear",borderRadius:3}}/></div>
      <button className="tap" onClick={onDone} style={{background:"transparent",border:"1px solid "+P.red+"45",color:P.red,borderRadius:8,padding:"9px 18px",fontFamily:F.mono,fontSize:9,fontWeight:800,cursor:"pointer"}}>THE URGE FADED</button>
    </div>
  );
}

  var phase=BSEQ[phi%4];var col=cols[phase]||P.gold;
  useEffect(function(){
    if(done)return;setCnt(4);
    var ci=setInterval(function(){setCnt(function(c){return Math.max(1,c-1);});},1000);
    var pt=setTimeout(function(){var nx=phi+1;if(nx>=16){clearInterval(ci);setDone(true);return;}setPhi(nx);},4000);
    return function(){clearInterval(ci);clearTimeout(pt);};
  },[phi,done]);
  var animName=phase==="inhale"?"breathIn":phase==="exhale"?"breathOut":phi%4===1?"breathHold":"breathHoldLow";
  if(done)return <div style={{textAlign:"center"}}><div style={{fontSize:44,marginBottom:14}}>✓</div><div style={{fontSize:18,fontWeight:700,color:P.green,marginBottom:6}}>4 rounds complete</div><div style={{fontSize:12,color:P.muted,marginBottom:24}}>Your nervous system is calmer now.</div><button className="tap" onClick={onDone} style={{background:P.green,color:"#000",border:"none",borderRadius:8,padding:"13px 32px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Log the win</button></div>;
  return <div style={{textAlign:"center",width:"100%"}}><div style={{fontFamily:F.mono,fontSize:9,color:P.muted,letterSpacing:3,marginBottom:28}}>BOX BREATHING {Math.floor(phi/4)+1}/4</div><div style={{position:"relative",width:180,height:180,margin:"0 auto 28px",display:"flex",alignItems:"center",justifyContent:"center"}}><div key={phi} style={{width:120,height:120,borderRadius:"50%",background:col+"12",border:"2px solid "+col+"40",animation:animName+" 4s ease forwards",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontFamily:F.mono,fontSize:28,fontWeight:700,color:col}}>{cnt}</span></div></div><div style={{fontFamily:F.mono,fontSize:16,fontWeight:700,color:col,letterSpacing:4}}>{names[phase]||"HOLD"}</div></div>;
}

function DelayTimer({onDone}){
  var T=600;var[t,setT]=useState(T);var[done,setDone]=useState(false);
  useEffect(function(){if(done||t<=0){if(t<=0)setDone(true);return;}var id=setTimeout(function(){setT(function(v){return v-1;});},1000);return function(){clearTimeout(id);};},[t,done]);
  var m=Math.floor(t/60),s=t%60,pct=((T-t)/T)*100;
  if(done)return <div style={{textAlign:"center"}}><div style={{fontSize:44,marginBottom:14}}>✓</div><div style={{fontSize:18,fontWeight:700,color:P.green,marginBottom:6}}>10 minutes done.</div><div style={{fontSize:12,color:P.muted,marginBottom:6,lineHeight:1.7}}>Urges peak at ~3 min then drop off.</div><button className="tap" onClick={onDone} style={{background:P.green,color:"#000",border:"none",borderRadius:8,padding:"13px 32px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Log the win</button></div>;
  return <div style={{textAlign:"center",width:"100%"}}><div style={{fontFamily:F.mono,fontSize:9,color:P.blue,letterSpacing:3,marginBottom:10}}>WAIT IT OUT</div><div style={{fontSize:12,color:P.muted,marginBottom:28,lineHeight:1.7}}>Most urges fade in under 10 minutes.<br/>Your only job right now: wait.</div><div style={{fontFamily:F.mono,fontSize:64,fontWeight:700,color:P.blue,lineHeight:1,marginBottom:14}}>{(m<10?"0":"")+m+":"+(s<10?"0":"")+s}</div><div style={{width:200,height:4,background:P.dim,borderRadius:2,margin:"0 auto 24px",overflow:"hidden"}}><div style={{height:"100%",background:P.blue,width:pct+"%",transition:"width 1s linear"}}/></div><button className="tap" onClick={function(){setDone(true);}} style={{background:"transparent",border:"1px solid "+P.border,color:P.muted,borderRadius:6,padding:"8px 20px",fontFamily:F.mono,fontSize:9,letterSpacing:2,cursor:"pointer"}}>ALREADY FADED</button></div>;
}

function PhysTimer({task,duration,onDone}){
  var[t,setT]=useState(duration);var[done,setDone]=useState(false);
  useEffect(function(){if(done||t<=0){if(t<=0)setDone(true);return;}var id=setTimeout(function(){setT(function(v){return v-1;});},1000);return function(){clearTimeout(id);};},[t,done]);
  var m=Math.floor(t/60),s=t%60,pct=((duration-t)/duration)*100;
  if(done)return <div style={{textAlign:"center"}}><div style={{fontSize:44,marginBottom:14}}>✓</div><div style={{fontSize:18,fontWeight:700,color:P.green,marginBottom:24}}>Done.</div><button className="tap" onClick={onDone} style={{background:P.green,color:"#000",border:"none",borderRadius:8,padding:"13px 32px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Log the win</button></div>;

            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              {ROUTE_STAGES.map(function(s,i){

                      {isComplete?"✓":s.icon}

            {/* Connection line */}
            <div style={{height:3,background:P.dim,borderRadius:2,overflow:"hidden",marginBottom:8}}>
              <div style={{height:"100%",background:"linear-gradient(90deg,#94a3b8,#10b981,#3b82f6,#f59e0b,#ef4444)",width:((currentStageIdx/ROUTE_STAGES.length)*100+(getStageProgress(ROUTE_STAGES[currentStageIdx],st,cd,jrnl,pld).pct/ROUTE_STAGES.length))+"%",transition:"width 1s ease"}}/>
            </div>
            <div style={{fontFamily:F.mono,fontSize:9,color:P.muted}}>

function PrivacyView({xtra,onToast}){
  var[backup,setBackup]=useState("");
  var[restore,setRestore]=useState("");
  var[status,setStatus]=useState("");
  var makeBackup=function(){
    var data={};
    try{Object.keys(localStorage).filter(function(k){return k.indexOf("bsys7_")===0;}).forEach(function(k){data[k]=localStorage.getItem(k);});}catch(e){}
    var txt=JSON.stringify({app:"Build System",version:"v15",created:new Date().toISOString(),data:data},null,2);
    setBackup(txt);setStatus("Backup created.");
  };
  var copyBackup=function(){
    if(!backup)makeBackup();
    var txt=backup||"";
    try{navigator.clipboard&&navigator.clipboard.writeText(txt);}catch(e){}
    setStatus("Backup copied if clipboard permission is allowed.");
  };
  var restoreBackup=function(){
    try{
      var parsed=JSON.parse(restore);var data=parsed.data||parsed;
      Object.keys(data).forEach(function(k){if(k.indexOf("bsys7_")===0)localStorage.setItem(k,data[k]);});
      setStatus("Backup restored. Reloading.");setTimeout(function(){location.reload();},700);
    }catch(e){setStatus("Could not restore. Backup text is invalid.");}
  };
  var deleteAll=function(){
    if(!confirm("Delete all app data on this device?"))return;
    Object.keys(localStorage).filter(function(k){return k.indexOf("bsys7_")===0;}).forEach(function(k){localStorage.removeItem(k);});
    location.reload();
  };
  return(
    <div className="fadeIn" style={{padding:"16px 14px 24px"}}>
      <div style={{marginBottom:18}}><div className="section-kicker" style={{marginBottom:7}}>PRIVACY</div><div style={{fontSize:26,fontWeight:950,letterSpacing:-.5,marginBottom:5}}>Data control</div><div style={{fontSize:13,color:P.muted,lineHeight:1.65}}>This version stores data on this device using browser storage. No account. No server sync.</div></div>
      <div className="product-card" style={{padding:15,marginBottom:12}}>
        <div style={{fontSize:16,fontWeight:900,marginBottom:8}}>Local-first storage</div>
        {['No login required','Progress stays in this browser','You can export a backup','You can delete everything'].map(function(t){return <div key={t} style={{display:"flex",gap:9,alignItems:"center",fontSize:12,color:P.muted,margin:"8px 0"}}><span style={{color:P.green}}>✓</span><span>{t}</span></div>;})}
      </div>
      <div className="product-card" style={{padding:15,marginBottom:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <button className="tap calm-button" onClick={makeBackup} style={{background:P.blue+"12",border:"1px solid "+P.blue+"35",color:P.blue}}>Create backup</button>
          <button className="tap calm-button" onClick={copyBackup} style={{background:P.surface,border:"1px solid "+P.border,color:P.text}}>Copy backup</button>
        </div>
        {backup&&<textarea className="clean-input" value={backup} readOnly rows={6} style={{fontFamily:F.mono,fontSize:9,lineHeight:1.45,resize:"vertical"}}/>}
      </div>
      <div className="product-card" style={{padding:15,marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:900,marginBottom:8}}>Restore backup</div>
        <textarea className="clean-input" value={restore} onChange={function(e){setRestore(e.target.value);}} placeholder="Paste backup JSON here" rows={5} style={{fontFamily:F.mono,fontSize:10,lineHeight:1.5,resize:"vertical",marginBottom:10}}/>
        <button className="tap calm-button" onClick={restoreBackup} style={{width:"100%",background:P.green+"12",border:"1px solid "+P.green+"35",color:P.green}}>Restore</button>
      </div>
      <button className="tap" onClick={deleteAll} style={{width:"100%",background:P.red+"10",border:"1px solid "+P.red+"35",color:P.red,borderRadius:14,padding:"13px",fontSize:13,fontWeight:900,cursor:"pointer"}}>Delete all local data</button>
      {status&&<div style={{marginTop:12,fontSize:12,color:P.muted,textAlign:"center"}}>{status}</div>}
      <div style={{height:70}}/>
    </div>
  );
}

function App(){

  var[communityOpen,setCommunityOpen]=useState(false);
  var[futureSelfOpen,setFutureSelfOpen]=useState(false);
  var[identityOpen,setIdentityOpen]=useState(false);
  var[reviewOpen,setReviewOpen]=useState(false);
  var[replacementOpen,setReplacementOpen]=useState(false);
  var[sosOpen,setSosOpen]=useState(false);
  var[installPrompt,setInstallPrompt]=useState(null);

  useEffect(function(){
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('./sw.js').catch(function(e){});
    }
    var handler=function(e){e.preventDefault();setInstallPrompt(e);};

  },[]);

  useEffect(function(){
    (async function(){
      var s=Object.assign({},DS),c=Object.assign({},CD),t={},h=[],m=Object.assign({},MD),a=[],n=Object.assign({},ND),x=Object.assign({},XD);
      try{var r=await window.storage.get(SK);if(r)s=Object.assign({},DS,JSON.parse(r.value));}catch(e){}
      try{var r2=await window.storage.get(CK);if(r2)c=Object.assign({},CD,JSON.parse(r2.value));}catch(e){}
      try{var r3=await window.storage.get(TK);if(r3){var p=JSON.parse(r3.value);if(p.date===todayStr())t=p.tasks||{};}}catch(e){}
      try{var r4=await window.storage.get(HK);if(r4)h=JSON.parse(r4.value);}catch(e){}
      try{var r5=await window.storage.get(MK);if(r5)m=Object.assign({},MD,JSON.parse(r5.value));}catch(e){}
      try{var r6=await window.storage.get(AK);if(r6)a=JSON.parse(r6.value);}catch(e){}
      try{var r7=await window.storage.get(NK);if(r7)n=Object.assign({},ND,JSON.parse(r7.value));}catch(e){}
      try{var r8=await window.storage.get(XK);if(r8)x=Object.assign({},XD,JSON.parse(r8.value));}catch(e){}
      var pl=Object.assign({},PLD),jr=Object.assign({},JD);

      try{var r10=await window.storage.get(JK);if(r10)jr=Object.assign({},JD,JSON.parse(r10.value));}catch(e){}
      var ac=Object.assign({},ACCDEF),hbv=Object.assign({},HBD);
      try{var r11=await window.storage.get(ACCK);if(r11)ac=Object.assign({},ACCDEF,JSON.parse(r11.value));}catch(e){}
      try{var r12=await window.storage.get(HBK);if(r12)hbv=Object.assign({},HBD,JSON.parse(r12.value));}catch(e){}
      setSt(s);setCd(c);setTask(t);setHist(h);setMot(m);setAchs(a);setNd(n);setPld(pl);setJrnl(jr);setAcc(ac);setHb(hbv);
      var nx=Object.assign({},x,{lastOpen:new Date().toISOString()});
      setXtra(nx);window.storage.set(XK,JSON.stringify(nx)).catch(function(e){});
      if(!s.name)setOb(1);
      else if(!t._checkin){setDailyCheckinOpen(true);}
      else if(!t._env)setEnvQ(true);
      setReady(true);
    })();
  },[]);

  useEffect(function(){
    if(!ready||!st.name)return;
    var earned=achs||[];
    var newOnes=ACHIEVEMENTS.filter(function(a){return !earned.includes(a.id)&&a.check(st,cd);});
    if(newOnes.length>0){
      var ne=earned.concat(newOnes.map(function(a){return a.id;}));
      setAchs(ne);
      window.storage.set(AK,JSON.stringify(ne)).catch(function(e){});
      setAchNew(newOnes[newOnes.length-1]);
      setTimeout(function(){setAchNew(null);},3500);
    }
  },[st,cd,ready]);

  useEffect(function(){
    if(!ready||!st.name||st.shield)return;
    if(checkShieldEarn(st,hist)){
      var ns=Object.assign({},st,{shield:true,shieldsEarned:(st.shieldsEarned||0)+1});
      setSt(ns);window.storage.set(SK,JSON.stringify(ns)).catch(function(e){});
      setShieldOverlay(true);
    }
  },[hist,ready]);

  var saveS=async function(ns){setSt(ns);try{await window.storage.set(SK,JSON.stringify(ns));}catch(e){}};
  var saveC=async function(nc){setCd(nc);try{await window.storage.set(CK,JSON.stringify(nc));}catch(e){}};
  var saveT=async function(nt){setTask(nt);try{await window.storage.set(TK,JSON.stringify({date:todayStr(),tasks:nt}));}catch(e){}};
  var saveH=async function(nh){setHist(nh);try{await window.storage.set(HK,JSON.stringify(nh));}catch(e){}};
  var saveMot=async function(nm){setMot(nm);try{await window.storage.set(MK,JSON.stringify(nm));}catch(e){}};
  var saveNd=async function(nn){setNd(nn);try{await window.storage.set(NK,JSON.stringify(nn));}catch(e){}};
  var saveX=async function(nx){setXtra(nx);try{await window.storage.set(XK,JSON.stringify(nx));}catch(e){}};
  var savePld=async function(np){setPld(np);try{await window.storage.set(PK,JSON.stringify(np));}catch(e){}};
  var saveJrnl=async function(nj){setJrnl(nj);try{await window.storage.set(JK,JSON.stringify(nj));}catch(e){}};
  var saveAcc=async function(na){setAcc(na);try{await window.storage.set(ACCK,JSON.stringify(na));}catch(e){}};
  var saveHb=async function(nh){setHb(nh);try{await window.storage.set(HBK,JSON.stringify(nh));}catch(e){}};

  var showToast=function(msg){setToast(msg);setTimeout(function(){setToast(null);},2500);};
  var addFloat=function(xp,e){
    if(!e||!e.currentTarget)return;
    var r=e.currentTarget.getBoundingClientRect();
    var id=Date.now()+Math.random();
    setFl(function(f){return f.concat([{id:id,xp:xp,x:r.left+r.width/2-18,y:r.top-8}]);});
    setTimeout(function(){setFl(function(f){return f.filter(function(i){return i.id!==id;});});},1300);
  };

  var calcXP=function(base,stat){
    var ul=getUnlocked(st.stats),ev=todayEv();
    var sm=streakMult(st.streak,ul.includes("relent"));
    var bn=cd.bounce&&Date.now()<new Date(cd.bounce).getTime()?1.5:1;
    var xp=base,m=ev.mult||1;
    if(ev.type==="bad"&&ul.includes("zen"))m=1;
    if(ev.statMult&&ev.statMult[stat])m*=ev.statMult[stat];
    xp*=m*sm*bn;
    var sk={body:"beast",mind:"iron_s",energy:"engine",skill:"sharp"};
    if(ul.includes(sk[stat]))xp*=1.1;
    if(ul.includes("mach"))xp+=8;
    return Math.max(1,Math.round(xp));
  };
  var applyXP=function(ns,stat,xp){
    var ss=Object.assign({},ns.stats[stat],{xp:ns.stats[stat].xp+xp});
    var up=false;
    while(ss.xp>=xpCap(ss.level)){ss.xp-=xpCap(ss.level);ss.level++;up=true;}
    var newStats=Object.assign({},ns.stats);newStats[stat]=ss;
    return{ns:Object.assign({},ns,{stats:newStats}),up:up,lv:ss.level};
  };

  var completeTask=async function(id,base,stat,e){
    if(tasks[id])return;
    var xp=calcXP(base,stat);
    var nt=Object.assign({},tasks);nt[id]=true;
    await saveT(nt);
    var ns=Object.assign({},st);
    var pTot=Object.values(st.stats).reduce(function(a,v){return a+v.level;},0);
    var res=applyXP(ns,stat,xp);ns=res.ns;ns.totalTasks=(ns.totalTasks||0)+1;
    var allCoreIds=CORE.map(function(q){return q.id;}).concat([HARD.id]);
    var allCore=allCoreIds.every(function(qid){return nt[qid];});
    if(allCore&&ns.lastDate!==todayStr()){
      var consec=ns.lastDate===ydayStr();ns.streak=consec?ns.streak+1:1;
      ns.best=Math.max(ns.best||0,ns.streak);ns.lastDate=todayStr();ns.totalDays=(ns.totalDays||0)+1;
      var nh=hist.includes(todayStr())?hist:hist.concat([todayStr()]);await saveH(nh);
    }
    var nTot=Object.values(ns.stats).reduce(function(a,v){return a+v.level;},0);
    await saveS(ns);
    bumpIdentity(1);
    if(getRank(nTot).label!==getRank(pTot).label)setModal({type:"rank",data:{rank:getRank(nTot)}});
    else if(res.up)showToast(SM[stat].label+" leveled up to "+res.lv);
    else addFloat(xp,e);
  };

  var urgeWon=async function(method,intensity,ctx){
    var xp=Math.round(calcXP(method.xp,"mind")*(intensity.mult||1));
    var res=applyXP(Object.assign({},st),"mind",xp);await saveS(res.ns);
    var wk=weekKey();
    var wkData=(cd.weekData||{})[wk]||{u:0,r:0,s:0};
    var newWkData=Object.assign({},wkData,{r:(wkData.r||0)+1});
    var newWeekData=Object.assign({},(cd.weekData||{}));newWeekData[wk]=newWkData;
    var newRepCounts=Object.assign({},(cd.repCounts||{}));newRepCounts[method.id]=(newRepCounts[method.id]||0)+1;
    var nc=Object.assign({},cd,{
      resisted:(cd.resisted||0)+1,
      totalResisted:(cd.totalResisted||0)+1,
      log:(cd.log||[]).concat([{ts:new Date().toISOString(),won:true,intensity:intensity.id,method:method.id,ctx:ctx,tod:tod()}]),
      repCounts:newRepCounts,
      weekData:newWeekData,
    });
    await saveC(nc);setUrge(null);setQSOpen(false);
    bumpIdentity(2);
    setModal({type:"win",data:{xp:xp,intensity:intensity,method:method,total:nc.totalResisted}});
  };

  var onAlmost=async function(){
    var xp=15;var res=applyXP(Object.assign({},st),"mind",xp);await saveS(res.ns);
    var nc=Object.assign({},cd,{
      totalResisted:(cd.totalResisted||0)+1,
      log:(cd.log||[]).concat([{ts:new Date().toISOString(),won:true,intensity:"low",method:"almost",ctx:"near_miss",tod:tod()}]),
    });
    await saveC(nc);
    bumpIdentity(1);
    showToast("Near-miss logged! +15 XP");
  };

  var logRelapse=async function(ctx){
    var relapseInfo=typeof ctx==="object"&&ctx?ctx:{ctx:ctx};
    var relapseCtx=relapseInfo.ctx||"other";
    var lost=cleanDays(cd.start);
    if(st.shield&&lost>0){var ns=Object.assign({},st,{shield:false});await saveS(ns);showToast("Shield used! Streak protected.");return;}
    var wk=weekKey();
    var wkData=(cd.weekData||{})[wk]||{u:0,r:0,s:0};
    var newWkData=Object.assign({},wkData,{s:(wkData.s||0)+1});
    var newWeekData=Object.assign({},(cd.weekData||{}));newWeekData[wk]=newWkData;
    var nc=Object.assign({},CD,cd,{
      start:new Date().toISOString(),relCount:(cd.relCount||0)+1,
      bounce:new Date(Date.now()+864e5).toISOString(),
      resisted:0,lifeDays:(cd.lifeDays||0)+lost,

      log:(cd.log||[]).concat([{ts:new Date().toISOString(),won:false,ctx:relapseCtx,repair:relapseInfo.action||null,repairLabel:relapseInfo.actionLabel||null,tod:tod()}]),
      weekData:newWeekData,
    });
    await saveC(nc);setModal({type:"relapse",data:{lost:lost,life:nc.lifeDays,total:nc.totalResisted}});
  };
  var startClean=async function(){await saveC(Object.assign({},CD,cd,{start:new Date().toISOString(),resisted:0,bounce:null}));setModal({type:"started",data:{}});};
  var quickRestart=async function(){var res=applyXP(Object.assign({},st),"mind",15);await saveS(res.ns);setModal({type:"started",data:{}});};
  var defeatBoss=async function(boss){
    if((st.beaten||[]).includes(boss.id))return;setBoss(null);
    var ns=Object.assign({},st,{beaten:(st.beaten||[]).concat([boss.id])});
    var pT=Object.values(st.stats).reduce(function(a,v){return a+v.level;},0);

    var nT=Object.values(ns.stats).reduce(function(a,v){return a+v.level;},0);await saveS(ns);

    else if(res.up)showToast(SM[boss.stat].label+" leveled up to "+res.lv);

  var claimMicro=async function(id,xp){
    var wk=weekKey();
    var mc=Object.assign({},(cd.microClaimed||{}));mc[wk+id]=true;
    var nc=Object.assign({},cd,{microClaimed:mc});

  var dismissEnv=async function(risky){
    setEnvQ(false);
    var nt=Object.assign({},tasks,{_env:true});await saveT(nt);
    if(risky)showToast("Change environment — move to another room.");
  };
  var onMood=async function(moodId){
    var moodMap=Object.assign({},(nd&&nd.mood)||{});moodMap[todayStr()]=moodId;
    var nn=Object.assign({},nd,{mood:moodMap});
    await saveNd(nn);
    var mood=MOODS.find(function(m){return m.id===moodId;});
    showToast("Mood: "+mood.emoji+" "+mood.label);
  };
  var onPHComplete=async function(){var xp=50;var res=applyXP(Object.assign({},st),"mind",xp);var ns=Object.assign({},res.ns,{powerHours:(st.powerHours||0)+1});await saveS(ns);setPHOpen(false);showToast("Power Hour! +"+xp+" XP");};
  var onFMComplete=async function(xp){var res=applyXP(Object.assign({},st),"mind",xp);await saveS(res.ns);setFMOpen(false);showToast("Focus done! +"+xp+" XP");};
