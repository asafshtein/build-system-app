  var onOpenMotivation=function(type){if(type==="acc")setAccOpen(true);else setMotOpen(true);};

  var onCompleteLesson=async function(lessonId){
    var done=Object.assign({},(xtra&&xtra.lessonDone)||{});
    if(done[lessonId])return;
    done[lessonId]=new Date().toISOString();
    var nx=Object.assign({},xtra,{lessonDone:done});
    var res=applyXP(Object.assign({},st),"skill",10);
    await saveS(res.ns);await saveX(nx);
    showToast("Lesson complete. +10 XP");
  };

  var onPledge=async function(){
    var today=new Date().toDateString();
    var np=Object.assign({},pld,{today:today,streak:pld.today===ydayStr()?(pld.streak||0)+1:1,total:(pld.total||0)+1});
    await savePld(np);bumpIdentity(1);showToast("Pledge kept. "+np.streak+"d streak.");
  };

  var onSaveJournal=async function(text,ctx){
    var nj=Object.assign({},jrnl,{entries:(jrnl.entries||[]).concat([{ts:new Date().toISOString(),text:text,ctx:ctx||"general"}])});
    await saveJrnl(nj);showToast("Note saved.");
  };

  var onUpdateTimeSaved=async function(settings){
    var np=Object.assign({},pld,settings);await savePld(np);setTimeSavedOpen(false);showToast("Saved.");
  };

  var bumpIdentity=async function(points){
    var id=Object.assign({},(xtra&&xtra.identity)||{});
    id.score=(id.score||0)+points;
    id.last=new Date().toISOString();
    var nx=Object.assign({},xtra,{identity:id});
    await saveX(nx);
  };

  var onSaveFutureSelf=async function(message){
    var nx=Object.assign({},xtra,{futureSelf:{message:message,created:new Date().toISOString()}});
    await saveX(nx);setFutureSelfOpen(false);showToast("Future self saved.");
  };

  var onSaveIdentity=async function(identity){
    var old=Object.assign({},(xtra&&xtra.identity)||{});
    var nx=Object.assign({},xtra,{identity:Object.assign({},old,identity,{score:old.score||0,last:new Date().toISOString()})});
    await saveX(nx);setIdentityOpen(false);showToast("Identity saved.");
  };

  var onSaveNightReview=async function(review){
    var nx=Object.assign({},xtra,{review:Object.assign({},review,{date:todayStr(),ts:new Date().toISOString()})});
    var res=applyXP(Object.assign({},st),"mind",15);
    await saveS(res.ns);await saveX(nx);setReviewOpen(false);showToast("Review saved. +15 XP");
  };

  var onToggleFriction=async function(itemId){
    var cur=xtra&&xtra.friction&&xtra.friction.date===todayStr()?Object.assign({},xtra.friction.items||{}):{};
    cur[itemId]=!cur[itemId];
    var nx=Object.assign({},xtra,{friction:{date:todayStr(),items:cur}});
    await saveX(nx);showToast(cur[itemId]?"Friction added.":"Friction removed.");
  };

  var onSaveReplacementPlan=async function(plan){
    var nx=Object.assign({},xtra,{replacementPlan:Object.assign({},plan,{saved:new Date().toISOString()})});
    await saveX(nx);setReplacementOpen(false);showToast("Replacement saved.");
  };

  var onCompleteRealMission=async function(mission){
    var day=todayStr();
    var all=Object.assign({},(xtra&&xtra.realMissions)||{});
    var dm=Object.assign({},all[day]||{});
    if(dm[mission.id])return;
    dm[mission.id]=new Date().toISOString();all[day]=dm;
    var nx=Object.assign({},xtra,{realMissions:all});
    var res=applyXP(Object.assign({},st),mission.stat,mission.xp);
    await saveS(res.ns);await saveX(nx);bumpIdentity(1);showToast("Mission done. +"+mission.xp+" XP");
  };

  var onSaveSOS=async function(sos){
    var nx=Object.assign({},xtra,{sos:Object.assign({},sos,{saved:new Date().toISOString()})});
    await saveX(nx);setSosOpen(false);showToast("SOS saved.");
  };

  var onInstallApp=async function(){
    if(!installPrompt){showToast("Open browser menu and choose Add to Home screen.");return;}
    try{installPrompt.prompt();await installPrompt.userChoice;}catch(e){}
    setInstallPrompt(null);showToast("Install prompt opened.");
  };

  var onSaveSetup=async function(setup){
    var nx=Object.assign({},xtra,{setup:Object.assign({},setup,{done:true,saved:new Date().toISOString()}),settings:Object.assign({},getSettingsData(xtra),{habitName:setup.habit,dangerTime:setup.dangerTime,reminderTime:setup.reminderTime,strictMode:setup.strictMode})});
    await saveX(nx);
    if(setup.why)await saveMot(Object.assign({},mot,{why:setup.why}));
    if(setup.habit){var nh=Object.assign({},hb,{habits:[{id:"main",label:setup.habit,icon:"🎯",active:true}],activeId:"main"});await saveHb(nh);}
    setView("home");showToast("Setup saved.");
  };

  var onSaveSettings=async function(settings){
    var nx=Object.assign({},xtra,{settings:Object.assign({},getSettingsData(xtra),settings),setup:Object.assign({},getSetupData(xtra),{habit:settings.habitName,dangerTime:settings.dangerTime,reminderTime:settings.reminderTime,strictMode:settings.strictMode})});
    await saveX(nx);showToast("Settings saved.");
  };

  var onSaveReminders=async function(reminders){
    var nx=Object.assign({},xtra,{reminders:Object.assign({},getReminderData(xtra),reminders)});
    await saveX(nx);showToast("Reminder plan saved.");
  };

  var onSaveFeedback=async function(item){
    var list=((xtra&&xtra.feedback)||[]).concat([item]).slice(-20);
    var nx=Object.assign({},xtra,{feedback:list});
    await saveX(nx);showToast("Feedback saved locally.");
  };

  var onDailyCheckin=async function(result){
    var nt=Object.assign({},tasks,{_checkin:true});await saveT(nt);
    if(result.mood){var mm=Object.assign({},(nd&&nd.mood)||{});mm[todayStr()]=result.mood;await saveNd(Object.assign({},nd,{mood:mm}));}
    setDailyCheckinOpen(false);
    if(!tasks._env)setEnvQ(true);
    if(result.slipped&&cd.start)setTimeout(function(){setJournalOpen("relapse");},400);
  };

  useEffect(function(){
    if(!ready||!cd.start)return;
    var d=cleanDays(cd.start);
    var m=checkMilestone(d);
    if(m&&!milestoneOverlay)setMilestoneOverlay(m);
  },[cd.start]);
  var openQuickUrge=function(){var qs=getQuickStrike(cd.repCounts);if(qs)setQSOpen(true);else setUrge({step:0});};

  var ev=todayEv();var sides=todaySides();var phase=PHASES[st.phase]||PHASES[0];
  var ul=getUnlocked(st.stats);var tLvl=Object.values(st.stats).reduce(function(a,v){return a+v.level;},0);
  var rank=getRank(tLvl);var sm=streakMult(st.streak,ul.includes("relent"));
  var cDays=cleanDays(cd.start);var cTitle=cleanTitle(cDays);
  var bounce=!!(cd.bounce&&Date.now()<new Date(cd.bounce).getTime());
  var days7=last7();
  var allCoreCheck=CORE.map(function(q){return q.id;}).concat([HARD.id]).every(function(id){return tasks[id];});
  var cDone=CORE.filter(function(q){return tasks[q.id];}).length;
  var todayW=(cd.log||[]).filter(function(e){return new Date(e.ts).toDateString()===todayStr()&&e.won;}).length;
  var wk=weekKey();
  var lowControl=getLowControlState(cd.log);
  var qsMethod=getQuickStrike(cd.repCounts);
  var comebackMsg=!cbDismissed?getComebackMsg(xtra.lastOpen):null;

  if(!ready)return(
    <div className="app-frame" style={{background:P.bg,minHeight:"100vh",width:"100%",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <style>{CSS}</style>
      <div style={{width:40,height:40,borderRadius:"50%",border:"2.5px solid "+P.dim,borderTopColor:P.gold,animation:"spin .8s linear infinite"}}/>
      <div style={{fontFamily:F.mono,color:P.muted,fontSize:11,letterSpacing:3}}>LOADING</div>
      <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
    </div>
  );
  if(ob===1)return <OnboardName val={draftName} setVal={setDN} onNext={async function(){if(!draftName.trim())return;await saveS(Object.assign({},st,{name:draftName.trim()}));setOb(2);}}/>;
  if(ob===2)return <OnboardPhase phases={PHASES} onPick={async function(i){await saveS(Object.assign({},st,{phase:i}));setOb(0);}}/>;

  return(
    <div className="app-frame" style={{background:P.bg,height:"100dvh",maxHeight:"100dvh",maxWidth:430,width:"100%",margin:"0 auto",color:P.text,fontFamily:F.display,position:"relative",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <style>{CSS}</style>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999}}>
        {floats.map(function(f){return <div key={f.id} style={{position:"absolute",top:f.y,left:f.x,color:P.gold,fontFamily:F.mono,fontSize:13,fontWeight:700,animation:"floatUp 1.1s ease forwards",whiteSpace:"nowrap"}}>+{f.xp}</div>;})}
      </div>
      {toast&&<div style={{position:"fixed",top:66,left:"50%",transform:"translateX(-50%)",background:P.card,border:"1px solid "+P.border,color:P.gold,padding:"9px 20px",fontFamily:F.mono,fontSize:11,zIndex:9000,whiteSpace:"nowrap",borderRadius:4,boxShadow:"0 4px 20px #000a"}}>{toast}</div>}
      {achNew&&<AchUnlock ach={achNew} onDone={function(){setAchNew(null);}}/>}
      {shieldOverlay&&<ShieldEarnedOverlay onDone={function(){setShieldOverlay(false);}}/>}
      {milestoneOverlay&&<MilestoneOverlay milestone={milestoneOverlay} onDone={function(){setMilestoneOverlay(null);}}/>}
      {chatOpen&&<AISupportChat onClose={function(){setChatOpen(false);}} mot={mot} cd={cd} cDays={cDays}/>}
      {journalOpen&&<JournalModal context={journalOpen} onSave={function(t){onSaveJournal(t,journalOpen);setJournalOpen(null);}} onClose={function(){setJournalOpen(null);}}/>}
      {timeSavedOpen&&<TimeSavedSettings pld={pld} onSave={onUpdateTimeSaved} onClose={function(){setTimeSavedOpen(false);}}/>}
      {dailyCheckinOpen&&<DailyCheckin name={st.name} onComplete={onDailyCheckin}/>}
      {accOpen&&<AccountabilityModal acc={acc} onSave={async function(na){await saveAcc(na);setAccOpen(false);showToast("Saved.");}} onClose={function(){setAccOpen(false);}} st={st} cd={cd} pld={pld} cDays={cDays} cdLog={cd.log}/>}
      {habitsOpen&&<HabitSwitcherModal hb={hb} onSave={async function(nh){await saveHb(nh);setHabitsOpen(false);showToast("Habits updated.");}} onClose={function(){setHabitsOpen(false);}}/>}
      {communityOpen&&<CommunityFeed cDays={cDays} cd={cd} onClose={function(){setCommunityOpen(false);}}/>}
      {futureSelfOpen&&<FutureSelfModal xtra={xtra} onSave={onSaveFutureSelf} onClose={function(){setFutureSelfOpen(false);}}/>}
      {identityOpen&&<IdentityModal xtra={xtra} onSave={onSaveIdentity} onClose={function(){setIdentityOpen(false);}}/>}
      {reviewOpen&&<NightReviewModal xtra={xtra} onSave={onSaveNightReview} onClose={function(){setReviewOpen(false);}}/>}
      {replacementOpen&&<ReplacementPlanModal xtra={xtra} onSave={onSaveReplacementPlan} onClose={function(){setReplacementOpen(false);}}/>}
      {sosOpen&&<SOSModal xtra={xtra} cd={cd} onSave={onSaveSOS} onClose={function(){setSosOpen(false);}}/>}
      {envQ&&!dailyCheckinOpen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:8800,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:P.card,border:"1px solid "+P.border,borderRadius:10,padding:28,maxWidth:340,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>Daily check-in</div>
            <div style={{fontSize:13,color:P.muted,marginBottom:22,lineHeight:1.7}}>Are you alone in a situation where you feel at risk right now?</div>
            <div style={{display:"flex",gap:10}}>
              <button className="tap" onClick={function(){dismissEnv(false);}} style={{flex:1,padding:"11px 0",background:"#0f2a1a",border:"1px solid #10b98144",color:"#10b981",borderRadius:6,fontSize:14,fontWeight:700,cursor:"pointer"}}>All good</button>
              <button className="tap" onClick={function(){dismissEnv(true);}} style={{flex:1,padding:"11px 0",background:"#2a0f0f",border:"1px solid #ef444444",color:"#ef4444",borderRadius:6,fontSize:14,fontWeight:700,cursor:"pointer"}}>Yes</button>
            </div>
          </div>
        </div>
      )}
      {urge&&!qsOpen&&<UrgeModal urge={urge} setUrge={setUrge} onWin={urgeWon} log={cd.log} mot={mot} nd={nd} repCounts={cd.repCounts} xtra={xtra}/>}
      {qsOpen&&qsMethod&&<QuickStrikeModal method={qsMethod} onWin={urgeWon} onClose={function(){setQSOpen(false);}}/>}
      {modal&&<BigModal modal={modal} onClose={function(){setModal(null);}} onRestart={quickRestart} onJournal={function(ctx){setJournalOpen(ctx);}}/>}
      {boss&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:8500,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:P.card,border:"1px solid "+P.border,borderRadius:10,padding:28,maxWidth:340,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:800,marginBottom:6}}>{boss.label}</div>
            <div style={{fontFamily:F.mono,fontSize:11,color:TIER_COL[boss.tier],letterSpacing:2,marginBottom:14}}>TIER {boss.tier} &middot; +{boss.xp} XP</div>
            <div style={{fontSize:13,color:P.muted,lineHeight:1.8,marginBottom:22}}>Did you actually complete this in real life?<br/>No cheating — only you know.</div>
            <div style={{display:"flex",gap:10}}>
              <button className="tap" onClick={function(){setBoss(null);}} style={{flex:1,padding:"11px 0",background:"transparent",border:"1px solid "+P.border,color:P.muted,borderRadius:6,fontSize:14,fontWeight:700,cursor:"pointer"}}>Not yet</button>
              <button className="tap" onClick={function(){defeatBoss(boss);}} style={{flex:1,padding:"11px 0",background:P.gold,border:"1px solid "+P.gold,color:"#000",borderRadius:6,fontSize:14,fontWeight:700,cursor:"pointer"}}>Yes — I did it</button>
            </div>
          </div>
        </div>
      )}
      {motOpen&&<MotivationModal mot={mot} onSave={async function(m){await saveMot(m);setMotOpen(false);showToast("Saved.");}} onClose={function(){setMotOpen(false);}}/>}
      {calOpen&&<CalendarModal hist={hist} cdLog={cd.log} nd={nd} onClose={function(){setCalOpen(false);}}/>}
      {distractOpen&&<DistractionPanel onClose={function(){setDistractOpen(false);}}/>}
      {phOpen&&<PowerHourModal onComplete={onPHComplete} onClose={function(){setPHOpen(false);}}/>}
      {wrOpen&&<WeeklyReport hist={hist} cd={cd} onClose={function(){setWROpen(false);}}/>}
      {fmOpen&&<FocusModeOverlay onComplete={onFMComplete} onClose={function(){setFMOpen(false);}}/>}
      <Hud st={st} bounce={bounce}
        onMotivation={onOpenMotivation} onCalendar={function(){setCalOpen(true);}}
        onPowerHour={function(){setPHOpen(true);}} onWeeklyReport={function(){setWROpen(true);}}
        onFocusMode={function(){setFMOpen(true);}} onHabits={function(){setHabitsOpen(true);}}
        onCommunity={function(){setCommunityOpen(true);}} acc={acc}/>
      <XPBar st={st}/>
      <div style={{overflowY:"auto",overflowX:"hidden",flex:"1 1 auto",minHeight:0,paddingBottom:"calc(96px + env(safe-area-inset-bottom,0px))"}} className="viewSlide app-scroll-area">
        {view==="route"&&<RouteView st={st} cd={cd} jrnl={jrnl} pld={pld} cDays={cDays} onBoss={setBoss}/>}
        {view==="home"&&<HomeView st={st} cd={cd} tasks={tasks} sides={sides} ev={ev} phase={phase} sm={sm} calcXP={calcXP} completeTask={completeTask} cDone={cDone} allCore={allCoreCheck} days7={days7} hist={hist} cDays={cDays} cTitle={cTitle} bounce={bounce} startClean={startClean} openUrge={function(){setUrge({step:0});}} openQuickUrge={openQuickUrge} openDistract={function(){setDistractOpen(true);}} todayW={todayW} claimMicro={claimMicro} wk={wk} mot={mot} nd={nd} onMood={onMood} onAlmost={onAlmost} lowControl={!lcDismissed?lowControl:null} onDismissLowControl={function(){setLCD(true);}} comebackMsg={comebackMsg} onDismissComeback={function(){setCBD(true);}} easyMode={xtra.easyMode} onToggleEasy={toggleEasy} onNav={setView} pld={pld} onPledge={onPledge} onOpenChat={function(){setChatOpen(true);}} jrnl={jrnl} hb={hb} xtra={xtra} onCompleteLesson={onCompleteLesson} onOpenFutureSelf={function(){setFutureSelfOpen(true);}} onOpenIdentity={function(){setIdentityOpen(true);}} onOpenReview={function(){setReviewOpen(true);}} onToggleFriction={onToggleFriction} onOpenReplacement={function(){setReplacementOpen(true);}} onCompleteRealMission={onCompleteRealMission} onOpenSOS={function(){setSosOpen(true);}} installPrompt={installPrompt} onInstallApp={onInstallApp}/>}
        {view==="control"&&<ControlView cd={cd} cDays={cDays} cTitle={cTitle} bounce={bounce} startClean={startClean} logRelapse={logRelapse} wk={wk} st={st} onNav={setView} pld={pld} onEditTimeSaved={function(){setTimeSavedOpen(true);}}/>}
        {view==="progress"&&<ProgressView st={st} cd={cd} hist={hist} ul={ul} rank={rank} tLvl={tLvl} achs={achs} nd={nd} onCalendar={function(){setCalOpen(true);}} jrnlEntries={jrnl&&jrnl.entries||[]}/>}
        {view==="bosses"&&<BossesView st={st} onBoss={setBoss}/>}
        {view==="setup"&&<SetupView xtra={xtra} mot={mot} onSave={onSaveSetup}/>}
        {view==="tools"&&<ToolsView onNav={setView}/>}
        {view==="privacy"&&<PrivacyView xtra={xtra} onToast={showToast}/>}
        {view==="settings"&&<SettingsView xtra={xtra} onSave={onSaveSettings} onNav={setView}/>}
        {view==="reminders"&&<RemindersView xtra={xtra} onSave={onSaveReminders}/>}
        {view==="feedback"&&<FeedbackView xtra={xtra} onSave={onSaveFeedback}/>}
      </div>
      <Nav view={view} setView={setView}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
